<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khách Hàng</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; background: #f3f5f7; }
        .c { max-width: 700px; margin: auto; padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 8px; margin: 4px; cursor: pointer; }
        .p { background: #0a84ff; color: #fff; width: 48%; }
        .g { background: #34c759; color: #fff; width: 48%; }
        .r { background: #ff3b30; color: #fff; width: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="c">
        <div class="card">
            <h2>Quản lý khách hàng</h2>
            <input id="ma" placeholder="Mã KH">
            <input id="ten" placeholder="Tên KH">
            <input id="sdt" placeholder="Số điện thoại">
            <input id="tim" placeholder="🔍 Tìm kiếm..." oninput="render()">
            <div>
                <button class="p" onclick="add()">Lưu</button>
                <button class="g" onclick="exp()">Xuất Excel</button>
            </div>
        </div>
        <div class="card" style="margin-top:12px">
            <table>
                <thead><tr><th>Mã</th><th>Tên</th><th>SĐT</th><th></th></tr></thead>
                <tbody id="tb"></tbody>
            </table>
        </div>
    </div>

    <script>
        let ds = JSON.parse(localStorage.getItem('kh') || '[]');
        
        function save() {
            localStorage.setItem('kh', JSON.stringify(ds));
            render();
        }

        function add() {
            let ma = document.getElementById('ma');
            let ten = document.getElementById('ten');
            let sdt = document.getElementById('sdt');
            
            if (!ma.value || !ten.value) return alert('Vui lòng nhập Mã KH và Tên KH');
            
            ds.unshift({ ma: ma.value, ten: ten.value, sdt: sdt.value, time: new Date().toLocaleString('vi-VN') });
            ma.value = ten.value = sdt.value = '';
            save();
        }

        function del(i) {
            if (confirm('Bạn có chắc chắn muốn xóa?')) {
                ds.splice(i, 1);
                save();
            }
        }

        function render() {
            let k = document.getElementById('tim').value.toLowerCase();
            let tb = document.getElementById('tb');
            tb.innerHTML = '';
            ds.forEach((x, i) => {
                if ((x.ma + x.ten + x.sdt).toLowerCase().includes(k)) {
                    tb.innerHTML += `<tr><td>${x.ma}<br><small>${x.time}</small></td><td>${x.ten}</td><td>${x.sdt}</td><td><button class="r" onclick="del(${i})">X</button></td></tr>`;
                }
            });
        }

        function exp() {
            let wb = XLSX.utils.book_new(), ws = XLSX.utils.json_to_sheet(ds);
            XLSX.utils.book_append_sheet(wb, ws, 'KhachHang');
            XLSX.writeFile(wb, 'KhachHang.xlsx');
        }

        render();
    </script>
</body>
</html>
